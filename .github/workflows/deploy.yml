name: DevOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Crucial: Gives the GitHub runner permission to request the OIDC JWT token
permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 1. Exchange the GitHub JWT token for temporary AWS credentials
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::685448854865:role/EC2-role
          aws-region: us-east-1

      # 2. Write the public key straight to the local runner workspace folder
      - name: Configure SSH Key
        run: |
          echo "${{ secrets.AWS_SSH_PUBLIC_KEY }}" > ./aws_key.pub
          chmod 600 ./aws_key.pub

      - name: Terraform Init & Plan
        run: |
          terraform init
          terraform plan

  terraform-apply:
    name: "Terraform Apply"
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 3. Exchange the token again safely for the deployment stage
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::685448854865:role/EC2-role
          aws-region: us-east-1

      # 4. Write both key materials locally to ensure apply phase works flawlessly
      - name: Configure SSH Keys
        run: |
          echo "${{ secrets.AWS_SSH_PUBLIC_KEY }}" > ./aws_key.pub
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > ./aws_key
          chmod 600 ./aws_key.pub ./aws_key

      - name: Terraform Apply
        run: |
          terraform init
          terraform apply -auto-approve
