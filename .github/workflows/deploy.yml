name: "DevOps Pipeline"

# Enables the manual "Run workflow" button with credential fields
on:
  workflow_dispatch:
    inputs:
      aws_access_key_id:
        description: 'Enter your AWS Access Key ID'
        required: true
        type: string
      aws_secret_access_key:
        description: 'Enter your AWS Secret Access Key'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: "Provision & Configure"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Uses the manual inputs you paste into the UI form
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ github.event.inputs.aws_access_key_id }}
          aws-secret-access-key: ${{ github.event.inputs.aws_secret_access_key }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.6

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Inject SSH Keys for Ansible & Terraform
        run: |
          mkdir -p /home/runner/.ssh
          # Inject the private key from your GitHub secrets repository panel
          echo "${{ secrets.AWS_SSH_PRIVATE_KEY }}" > /home/runner/.ssh/aws_key
          chmod 600 /home/runner/.ssh/aws_key
          
          # Automatically generate the matching public key for Terraform
          ssh-keygen -y -f /home/runner/.ssh/aws_key > /home/runner/.ssh/aws_key.pub
          chmod 644 /home/runner/.ssh/aws_key.pub

      - name: Terraform Init & Apply
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Wait for EC2 instance to wake up
        run: sleep 60

      - name: Run Ansible Playbook
        run: ansible-playbook -i inventory.ini playbook.yml
