name: DevOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Crucial: This gives the runner permission to request the OIDC JWT token from GitHub
permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

       Ried - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::685448854865:role/EC2-role
          aws-region: us-east-1

      # Passes your exact public key string directly into the plan runtime process
      - name: Terraform Init & Plan
        run: |
          terraform init
          terraform plan -var="ssh_public_key=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHacypVVtfDUvkpgwrxV4uu5WkOS9RSBSHM+c68VZkRR root@terraform"

  terraform-apply:
    name: "Terraform Apply"
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::685448854865:role/EC2-role
          aws-region: us-east-1

      # Passes your exact public key string directly into the apply runtime process
      - name: Terraform Apply
        run: |
          terraform init
          terraform apply -auto-approve -var="ssh_public_key=ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHacypVVtfDUvkpgwrxV4uu5WkOS9RSBSHM+c68VZkRR root@terraform"
