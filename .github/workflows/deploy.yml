name: DevOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Crucial: This gives the runner permission to request the OIDC JWT token from GitHub
permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::685448854865:role/EC2-role
          aws-region: us-east-1

      # Explicitly forces the public key string into the plan execution argument array
      - name: Terraform Init & Plan
        run: |
          terraform init
          terraform plan -var="ssh_public_key=${{ secrets.AWS_SSH_PUBLIC_KEY }}"

  terraform-apply:
    name: "Terraform Apply"
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::685448854865:role/EC2-role
          aws-region: us-east-1

      # Explicitly forces the public key string into the apply execution argument array
      - name: Terraform Apply
        run: |
          terraform init
          terraform apply -auto-approve -var="ssh_public_key=${{ secrets.AWS_SSH_PUBLIC_KEY }}"
