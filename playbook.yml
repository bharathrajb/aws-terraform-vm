---
- name: Configure Web Server with Nginx
  hosts: webservers
  become: yes
  gather_facts: no  # Disable initial fact gathering until connection is stable

  pre_tasks:
    - name: Wait for system to become reachable
      wait_for_connection:
        timeout: 120

    - name: Gather facts after validation
      setup:

  tasks:
    - name: Install Nginx
      dnf:
        name: nginx
        state: present

    - name: Start and enable Nginx service
      service:
        name: nginx
        state: started
        enabled: yes
