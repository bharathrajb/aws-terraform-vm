---
- name: Configure Web Server with Nginx
  hosts: webservers
  become: yes
  gather_facts: no

  pre_tasks:
    - name: Wait for port 22 to become available
      wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        delay: 5
        timeout: 180
        state: started
      delegate_to: localhost

  tasks:
    - name: Install Nginx via native shell
      shell: dnf install -y nginx

    - name: Start and enable Nginx service via native shell
      shell: |
        systemctl start nginx
        systemctl enable nginx
