---
- name: Configure Web Server with Nginx
  hosts: webservers
  become: yes
  gather_facts: no  # Completely bypass the problematic fact gathering step

  pre_tasks:
    - name: Wait for port 22 to become available
      wait_for:
        host: "{{ inventory_hostname }}"
        port: 22
        delay: 5
        timeout: 180
        state: started
      delegate_to: localhost  # Clean syntax replacement for local_action

  tasks:
    - name: Install Nginx
      dnf:
        name: nginx
        state: present

    - name: Start and enable Nginx service
      service:
        name: nginx
        state: started
        enabled: yes
