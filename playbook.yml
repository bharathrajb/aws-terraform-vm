---
- name: Configure Web Server with Nginx
  hosts: webservers
  become: yes
  gather_facts: no

  pre_tasks:
    - name: Wait for port 22 to become available
      local_action:
        module: wait_for
        host: "{{ inventory_hostname }}"
        port: 22
        delay: 5
        timeout: 180
        state: started

    - name: Gather facts after validation
      setup:

  tasks:
    - name: Install Nginx
      dnf:
        name: nginx
        state: present

    - name: Start and enable Nginx service
      service:
        name: nginx
        state: started
        enabled: yes
